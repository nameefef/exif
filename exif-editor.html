<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXIF 编辑器 - 设备预设</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #23232e;
    --border: #2e2e3a;
    --text: #e8e8ed;
    --text2: #9a9aa6;
    --accent: #5e9eff;
    --accent-hover: #7ab0ff;
    --danger: #ff4757;
    --success: #2ed573;
    --radius: 10px;
    --radius-sm: 6px;
  }
  html { font-size: 14px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .app { max-width: 1360px; margin: 0 auto; padding: 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .header h1 { font-size: 1.6rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .header h1 svg { width: 28px; height: 28px; }
  .header-sub { color: var(--text2); font-size: 0.85rem; margin-top: 2px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface); position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(94,158,255,0.06); }
  .upload-zone.has-image { padding: 0; border-style: solid; background: none; cursor: default; }
  .upload-zone input[type="file"] { display: none; }
  .upload-icon { width: 56px; height: 56px; margin: 0 auto 12px; color: var(--text2); }
  .upload-text { font-size: 1rem; font-weight: 500; }
  .upload-hint { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }

  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

  .preview-panel { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
  .preview-panel .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
  .preview-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; min-height: 360px; position: relative; }
  .preview-container img { max-width: 100%; max-height: 500px; border-radius: var(--radius-sm); object-fit: contain; }
  .preview-placeholder { color: var(--text2); text-align: center; }
  .preview-placeholder svg { width: 48px; height: 48px; margin-bottom: 8px; opacity: 0.4; }

  .editor-panel { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; }
  .editor-panel .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab-btn {
    padding: 10px 16px; background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 0.85rem; font-weight: 500; white-space: nowrap;
    border-bottom: 2px solid transparent; transition: all 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 16px; overflow-y: auto; max-height: 560px; }
  .tab-content.active { display: block; }

  .field-group { margin-bottom: 14px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .field-row { display: flex; gap: 8px; align-items: center; }
  .field-row > * { flex: 1; }
  .field-row .field-group { margin-bottom: 0; flex: 1; }
  select, input[type="text"], input[type="number"], input[type="datetime-local"], input[type="date"] {
    width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem;
    transition: border-color 0.15s; font-family: inherit;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  select option { background: var(--surface2); color: var(--text); }
  input::placeholder { color: var(--text2); opacity: 0.5; }
  .field-hint { font-size: 0.75rem; color: var(--text2); margin-top: 2px; opacity: 0.7; }

  .preset-selector { margin-bottom: 18px; }
  .preset-brand-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .brand-chip {
    padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer; font-size: 0.8rem;
    transition: all 0.15s; font-family: inherit; font-weight: 500;
  }
  .brand-chip:hover { border-color: var(--accent); color: var(--text); }
  .brand-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius-sm); border: none;
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { opacity: 0.85; }

  .action-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); justify-content: flex-end; }

  .gps-map-placeholder {
    width: 100%; height: 140px; background: var(--surface2); border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 0.85rem;
    border: 1px solid var(--border); margin-top: 8px; cursor: pointer;
    transition: border-color 0.15s;
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }
  .gps-map-placeholder:hover { border-color: var(--accent); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: var(--radius); color: var(--text);
    font-size: 0.85rem; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

  .section-title { font-size: 0.75rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 10px; padding-top: 12px; border-top: 1px solid var(--border); }
  .section-title:first-of-type { margin-top: 0; border-top: none; padding-top: 0; }

  .exif-summary { padding: 0 16px 12px; border-bottom: 1px solid var(--border); }
  .exif-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 0.8rem; }
  .exif-summary-item { display: flex; justify-content: space-between; gap: 8px; }
  .exif-summary-key { color: var(--text2); }
  .exif-summary-val { color: var(--text); text-align: right; word-break: break-all; }

  .loading-bar {
    height: 3px; background: var(--accent); border-radius: 2px;
    animation: loadBar 1.5s ease-in-out infinite;
    width: 0%;
  }
  @keyframes loadBar {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <div>
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        EXIF 编辑器
      </h1>
      <div class="header-sub">修改照片的 EXIF 信息 — 支持全部图片格式（PNG / WebP / JPEG / GIF / BMP）</div>
    </div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <div id="uploadPrompt">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div class="upload-text">点击或拖拽上传照片</div>
      <div class="upload-hint">支持任意格式（PNG / WebP / JPEG / GIF / BMP / TIFF），输出统一为高质量 JPEG</div>
    </div>
    <div id="previewArea" style="display:none">
      <img id="previewImage" alt="Preview">
      <div class="loading-bar" id="loadingBar" style="display:none"></div>
    </div>
  </div>

  <div id="exifSummary" class="exif-summary" style="display:none; margin-top: 12px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);">
    <div class="flex-between" style="padding: 10px 12px 6px;">
      <span style="font-size: 0.8rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em;">原始 EXIF 摘要</span>
    </div>
    <div class="exif-summary-grid" id="exifSummaryGrid" style="padding: 0 12px 10px;"></div>
  </div>

  <div class="main-grid">
    <div class="preview-panel">
      <div class="panel-header">照片预览</div>
      <div class="preview-container" id="previewContainer">
        <div class="preview-placeholder" id="previewPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <div>上传照片后显示预览</div>
        </div>
      </div>
    </div>

    <div class="editor-panel" id="editorPanel">
      <div class="panel-header">EXIF 编辑</div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="device">📱 设备信息</button>
        <button class="tab-btn" data-tab="photo">📷 拍摄参数</button>
        <button class="tab-btn" data-tab="gps">📍 位置信息</button>
      </div>

      <div class="tab-content active" id="tab-device">
        <div class="preset-selector">
          <div class="field-label">选择设备预设</div>
          <div class="preset-brand-row" id="brandChips"></div>
          <select id="presetModel" onchange="applyPreset()">
            <option value="">— 请先选择品牌 —</option>
          </select>
        </div>
        <div class="section-title">设备详情</div>
        <div class="field-group">
          <label class="field-label">制造商 (Make)</label>
          <input type="text" id="fMake" placeholder="例: Apple">
        </div>
        <div class="field-group">
          <label class="field-label">型号 (Model)</label>
          <input type="text" id="fModel" placeholder="例: iPhone 16 Pro Max">
        </div>
        <div class="field-group">
          <label class="field-label">软件版本 (Software)</label>
          <input type="text" id="fSoftware" placeholder="例: 18.0">
        </div>
        <div class="field-group">
          <label class="field-label">镜头信息 (Lens)</label>
          <input type="text" id="fLens" placeholder="例: iPhone 16 Pro Max back triple camera 6.86mm f/1.78">
        </div>
      </div>

      <div class="tab-content" id="tab-photo">
        <div class="flex-between" style="margin-bottom:6px;">
          <div class="section-title" style="margin:0; border:none; padding:0;">拍摄时间</div>
          <button class="btn btn-secondary" onclick="randomAllPhotoParams()" style="font-size:0.75rem; padding:4px 10px;">🎲 随机填充全部参数</button>
        </div>
        <div class="field-group">
          <label class="field-label">拍摄日期时间</label>
          <input type="datetime-local" id="fDateTime">
          <div class="field-hint">EXIF 将存储为 "YYYY:MM:DD HH:MM:SS" 格式</div>
        </div>
        <div class="section-title">相机参数</div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">光圈 (FNumber)</label>
            <input type="number" step="0.01" min="0.5" max="64" id="fAperture" placeholder="例: 1.78">
          </div>
          <div class="field-group">
            <label class="field-label">快门速度</label>
            <input type="text" id="fShutter" placeholder="例: 1/120 或 0.008">
            <div class="field-hint">格式: 1/120 或小数</div>
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">ISO 感光度</label>
            <input type="number" step="1" min="0" id="fISO" placeholder="例: 200">
          </div>
          <div class="field-group">
            <label class="field-label">焦距 (mm)</label>
            <input type="number" step="0.01" min="0" id="fFocal" placeholder="例: 6.86">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">曝光补偿 (EV)</label>
            <input type="number" step="0.1" id="fExposureBias" placeholder="例: 0.0">
          </div>
          <div class="field-group">
            <label class="field-label">35mm 等效焦距</label>
            <input type="number" step="1" min="0" id="fFocal35" placeholder="例: 24">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">数字变焦倍率</label>
            <input type="number" step="0.01" min="0" id="fDigitalZoom" placeholder="例: 1.0">
          </div>
          <div class="field-group">
            <label class="field-label">白平衡</label>
            <select id="fWhiteBalance">
              <option value="">— 不设置 —</option>
              <option value="0">自动</option>
              <option value="1">日光</option>
              <option value="2">阴天</option>
              <option value="3">白炽灯</option>
              <option value="4">荧光灯</option>
              <option value="5">闪光灯</option>
              <option value="6">自定义</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">测光模式</label>
            <select id="fMeteringMode">
              <option value="">— 不设置 —</option>
              <option value="0">未知</option>
              <option value="1">平均测光</option>
              <option value="2">中央重点测光</option>
              <option value="3">点测光</option>
              <option value="4">多区域测光</option>
              <option value="5">局部测光</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">闪光灯</label>
            <select id="fFlash">
              <option value="">— 不设置 —</option>
              <option value="0">未闪光</option>
              <option value="1">闪光</option>
              <option value="5">闪光 (检测到回光)</option>
              <option value="7">闪光 (强制)</option>
              <option value="16">未闪光 (强制)</option>
              <option value="24">自动模式</option>
            </select>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-gps">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">纬度</label>
            <input type="number" step="0.000001" min="-90" max="90" id="fLat" placeholder="例: 22.5431">
          </div>
          <div class="field-group" style="flex: 0.4">
            <label class="field-label">方向</label>
            <select id="fLatRef">
              <option value="N">北纬 N</option>
              <option value="S">南纬 S</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">经度</label>
            <input type="number" step="0.000001" min="-180" max="180" id="fLng" placeholder="例: 114.0579">
          </div>
          <div class="field-group" style="flex: 0.4">
            <label class="field-label">方向</label>
            <select id="fLngRef">
              <option value="E">东经 E</option>
              <option value="W">西经 W</option>
            </select>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">海拔 (米)</label>
          <input type="number" step="0.1" id="fAltitude" placeholder="例: 50.0">
        </div>
        <div class="field-group">
          <label class="field-label">GPS 日期</label>
          <input type="date" id="fGpsDate">
          <div class="field-hint">如未设置则使用拍摄日期</div>
        </div>
        <div class="gps-map-placeholder" id="gpsMapLink" onclick="openGpsMap()" title="点击在 OpenStreetMap 中打开">
          <span id="gpsMapText">设置坐标后点击可在地图中查看</span>
        </div>
        <div style="margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap;">
          <button class="btn btn-secondary" onclick="setRandomGps()">📍 随机坐标</button>
          <button class="btn btn-secondary" onclick="clearGps()">🗑️ 清空 GPS</button>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn btn-secondary" onclick="resetAll()" id="btnReset">↩️ 重置</button>
        <button class="btn btn-primary" id="btnDownload" onclick="downloadImage()" disabled>⬇️ 下载修改后的照片</button>
      </div>
    </div>
  </div>
</div>

let originalExif = null;

// ============== BRAND CHIPS ==============
function renderBrandChips() {
  const container = document.getElementById('brandChips');
  BRANDS.forEach(brand => {
    const chip = document.createElement('button');
    chip.className = 'brand-chip';
    chip.textContent = brand;
    chip.onclick = () => selectBrand(brand);
    container.appendChild(chip);
  });
}

function selectBrand(brand) {
  document.querySelectorAll('.brand-chip').forEach(c => c.classList.remove('active'));
  for (const chip of document.querySelectorAll('.brand-chip')) {
    if (chip.textContent === brand) { chip.classList.add('active'); break; }
  }
  const sel = document.getElementById('presetModel');
  sel.innerHTML = '<option value="">— 选择型号 —</option>';
  Object.keys(PRESETS[brand]).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
}

function applyPreset() {
  let activeBrand = null;
  for (const chip of document.querySelectorAll('.brand-chip')) {
    if (chip.classList.contains('active')) { activeBrand = chip.textContent; break; }
  }
  if (!activeBrand) return;
  const model = document.getElementById('presetModel').value;
  if (!model) return;
  const preset = PRESETS[activeBrand][model];
  if (!preset) return;
  document.getElementById('fMake').value = preset.make;
  document.getElementById('fModel').value = preset.model;
  document.getElementById('fSoftware').value = preset.software;
  document.getElementById('fLens').value = preset.lens;
  showToast(`已应用 ${activeBrand} ${model} 的预设`, 'success');
}

// ============== UPLOAD ==============
function setupUpload() {
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');

  zone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'INPUT' && !zone.classList.contains('has-image')) {
      input.click();
    }
  });
  input.addEventListener('change', () => {
    if (input.files && input.files[0]) handleFile(input.files[0]);
  });
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
}

async function handleFile(file) {
  if (!file.type.match(/^image\//i)) {
    showToast('请上传图片格式的文件', 'error');
    return;
  }

  currentFile = file;
  document.getElementById('uploadZone').classList.add('has-image');
  document.getElementById('loadingBar').style.display = 'block';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    // Show preview
    document.getElementById('previewImage').src = dataUrl;
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('uploadPrompt').style.display = 'none';
    document.getElementById('previewPlaceholder').style.display = 'none';

    // Load into canvas (works for ANY image format)
    await loadImageToCanvas(dataUrl);
    document.getElementById('loadingBar').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ============== CANVAS LOADING ==============
async function loadImageToCanvas(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      // Scale down if huge (max 4000px)
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      const maxDim = 4000;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      originalImageData = { canvas, ctx, width: w, height: h, img };

      // Try to read EXIF from original file
      readExifFromOriginal();

      document.getElementById('btnDownload').disabled = false;
      showToast('照片已加载，支持任意图片格式', 'success');
      resolve();
    };
    img.onerror = () => {
      showToast('图片加载失败', 'error');
      resolve();
    };
    img.src = dataUrl;
  });
}

async function readExifFromOriginal() {
  // If it's a JPEG we can read EXIF directly from file
  try {
    if (currentFile && currentFile.type.match(/jpeg|jpg/i)) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const exifData = piexif.load(e.target.result);
          if (exifData && Object.keys(exifData['0th']).length > 0) {
            originalExif = JSON.parse(JSON.stringify(exifData));
            populateFormFromExif(exifData);
            showExifSummary(exifData);
            showToast('EXIF 数据已加载', 'success');
            return;
          }
        } catch(ex) { /* ignore */ }
        // No EXIF found
        originalExif = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} };
        showExifSummary(null);
        showToast('未检测到 EXIF 数据，可以从头创建', 'info');
      };
      reader.readAsBinaryString(currentFile);
    } else {
      // PNG/WebP/etc - no native EXIF reading in browser
      originalExif = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} };
      showExifSummary(null);
      showToast('非 JPEG 格式，EXIF 将从空白创建', 'info');
    }
  } catch (err) {
    originalExif = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} };
    showExifSummary(null);
    showToast('未检测到 EXIF 数据，可以从头创建', 'info');
  }
}

function exifGet(exifObj, ifd, tag) {
  try { return exifObj[ifd][tag]; } catch(e) { return undefined; }
}

function showExifSummary(exif) {
  const container = document.getElementById('exifSummary');
  const grid = document.getElementById('exifSummaryGrid');
  container.style.display = 'block';

  if (!exif) {
    grid.innerHTML = '<div style="color:var(--text2);font-size:0.8rem;">无 EXIF 数据（非 JPEG 格式，EXIF 将全新创建）</div>';
    return;
  }

  const make = exifGet(exif, '0th', piexif.ImageIFD.Make) || '';
  const model = exifGet(exif, '0th', piexif.ImageIFD.Model) || '';
  const dt = exifGet(exif, 'Exif', piexif.ExifIFD.DateTimeOriginal) || '';
  const iso = exifGet(exif, 'Exif', piexif.ExifIFD.ISOSpeedRatings) || '';
  const fnum = exifGet(exif, 'Exif', piexif.ExifIFD.FNumber);
  const flen = exifGet(exif, 'Exif', piexif.ExifIFD.FocalLength);

  const items = [];
  if (make) items.push({k: '制造商', v: make});
  if (model) items.push({k: '型号', v: model});
  if (dt) items.push({k: '拍摄时间', v: String(dt).replace(/:/g, '-').replace(' ', ' T')});
  if (iso) items.push({k: 'ISO', v: iso});
  if (fnum) items.push({k: '光圈', v: 'f/' + rationalToFloat(fnum).toFixed(1)});
  if (flen) items.push({k: '焦距', v: rationalToFloat(flen).toFixed(1) + ' mm'});

  const lat = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLatitude);
  const lng = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLongitude);
  if (lat && lng) {
    try {
      const latD = dmsToDecimal(lat, exifGet(exif, 'GPS', piexif.GPSIFD.GPSLatitudeRef));
      const lngD = dmsToDecimal(lng, exifGet(exif, 'GPS', piexif.GPSIFD.GPSLongitudeRef));
      items.push({k: 'GPS', v: `${latD.toFixed(4)}, ${lngD.toFixed(4)}`});
    } catch(e) {}
  }

  if (items.length === 0) {
    grid.innerHTML = '<div style="color:var(--text2);font-size:0.8rem;">无 EXIF 数据</div>';
    return;
  }
  grid.innerHTML = items.map(it =>
    `<div class="exif-summary-item"><span class="exif-summary-key">${it.k}</span><span class="exif-summary-val">${it.v}</span></div>`
  ).join('');
}

// ============== POPULATE FORM ==============
function populateFormFromExif(exif) {
  setVal('fMake', exifGet(exif, '0th', piexif.ImageIFD.Make) || '');
  setVal('fModel', exifGet(exif, '0th', piexif.ImageIFD.Model) || '');
  setVal('fSoftware', exifGet(exif, '0th', piexif.ImageIFD.Software) || '');
  setVal('fLens', exifGet(exif, 'Exif', piexif.ExifIFD.LensModel) || '');

  const dtStr = exifGet(exif, 'Exif', piexif.ExifIFD.DateTimeOriginal) || exifGet(exif, '0th', piexif.ImageIFD.DateTime);
  if (dtStr) {
    const cleaned = String(dtStr).replace(/\//g, ':').trim();
    const parts = cleaned.split(' ');
    if (parts.length >= 2) {
      document.getElementById('fDateTime').value = parts[0].replace(/:/g, '-') + 'T' + parts[1];
    }
  }

  const fnum = exifGet(exif, 'Exif', piexif.ExifIFD.FNumber);
  if (fnum) setVal('fAperture', rationalToFloat(fnum));

  const expTime = exifGet(exif, 'Exif', piexif.ExifIFD.ExposureTime);
  if (expTime) {
    try {
      const n = Array.isArray(expTime) ? expTime[0] : expTime;
      const d = Array.isArray(expTime) ? expTime[1] : 1;
      if (d && n) setVal('fShutter', n/d < 1 && n > 0 && d > n ? `${Math.round(d/n)}/1` : (n/d).toFixed(4));
    } catch(e) {}
  }

  const iso = exifGet(exif, 'Exif', piexif.ExifIFD.ISOSpeedRatings);
  if (iso !== undefined && iso !== null) setVal('fISO', Array.isArray(iso) ? iso[0] : iso);

  const flen = exifGet(exif, 'Exif', piexif.ExifIFD.FocalLength);
  if (flen) setVal('fFocal', rationalToFloat(flen));

  const ebias = exifGet(exif, 'Exif', piexif.ExifIFD.ExposureBiasValue);
  if (ebias !== undefined && ebias !== null) setVal('fExposureBias', rationalToFloat(ebias));

  const f35 = exifGet(exif, 'Exif', piexif.ExifIFD.FocalLengthIn35mmFilm);
  if (f35) setVal('fFocal35', f35);

  const dz = exifGet(exif, 'Exif', piexif.ExifIFD.DigitalZoomRatio);
  if (dz) setVal('fDigitalZoom', rationalToFloat(dz));

  const wb = exifGet(exif, 'Exif', piexif.ExifIFD.WhiteBalance);
  if (wb !== undefined && wb !== null) document.getElementById('fWhiteBalance').value = String(wb);

  const mm = exifGet(exif, 'Exif', piexif.ExifIFD.MeteringMode);
  if (mm !== undefined && mm !== null) document.getElementById('fMeteringMode').value = String(mm);

  const flash = exifGet(exif, 'Exif', piexif.ExifIFD.Flash);
  if (flash !== undefined && flash !== null) document.getElementById('fFlash').value = String(flash);

  const lat = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLatitude);
  const latRef = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLatitudeRef);
  const lng = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLongitude);
  const lngRef = exifGet(exif, 'GPS', piexif.GPSIFD.GPSLongitudeRef);
  const alt = exifGet(exif, 'GPS', piexif.GPSIFD.GPSAltitude);
  const gpsDate = exifGet(exif, 'GPS', piexif.GPSIFD.GPSDateStamp);

  if (lat && lng) {
    try {
      setVal('fLat', dmsToDecimal(lat, latRef || 'N'));
      setVal('fLng', dmsToDecimal(lng, lngRef || 'E'));
      if (latRef) document.getElementById('fLatRef').value = latRef;
      if (lngRef) document.getElementById('fLngRef').value = lngRef;
    } catch(e) {}
  }
  if (alt) setVal('fAltitude', rationalToFloat(alt));
  if (gpsDate) document.getElementById('fGpsDate').value = String(gpsDate).replace(/:/g, '-');
  updateGpsMap();
}

// ============== BUILD EXIF ==============
function buildExif() {
  const baseExif = originalExif || { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} };
  const exif = JSON.parse(JSON.stringify(baseExif));

  function setIfd(ifd, tag, val) {
    if (val === '' || val === null || val === undefined || (typeof val === 'number' && isNaN(val))) {
      delete exif[ifd][tag];
    } else {
      exif[ifd][tag] = val;
    }
  }

  setIfd('0th', piexif.ImageIFD.Make, getVal('fMake'));
  setIfd('0th', piexif.ImageIFD.Model, getVal('fModel'));
  setIfd('0th', piexif.ImageIFD.Software, getVal('fSoftware'));
  setIfd('Exif', piexif.ExifIFD.LensModel, getVal('fLens'));

  const dtVal = document.getElementById('fDateTime').value;
  if (dtVal) {
    const d = new Date(dtVal);
    const fmt = `${d.getFullYear()}:${pad2(d.getMonth()+1)}:${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    setIfd('Exif', piexif.ExifIFD.DateTimeOriginal, fmt);
    setIfd('0th', piexif.ImageIFD.DateTime, fmt);
  } else {
    delete exif['Exif'][piexif.ExifIFD.DateTimeOriginal];
    delete exif['0th'][piexif.ImageIFD.DateTime];
  }

  const ap = parseFloat(getVal('fAperture'));
  if (!isNaN(ap) && ap > 0) setIfd('Exif', piexif.ExifIFD.FNumber, floatToRational(ap));
  else delete exif['Exif'][piexif.ExifIFD.FNumber];

  const shutterStr = getVal('fShutter');
  if (shutterStr) {
    const shutterVal = parseShutter(shutterStr);
    if (shutterVal !== null) {
      setIfd('Exif', piexif.ExifIFD.ExposureTime, shutterVal);
      setIfd('Exif', piexif.ExifIFD.ShutterSpeedValue, floatToRational(-Math.log2(shutterVal[0]/shutterVal[1]), 10000));
    }
  } else {
    delete exif['Exif'][piexif.ExifIFD.ExposureTime];
    delete exif['Exif'][piexif.ExifIFD.ShutterSpeedValue];
  }

  const iso = parseInt(getVal('fISO'));
  if (!isNaN(iso) && iso > 0) setIfd('Exif', piexif.ExifIFD.ISOSpeedRatings, iso);

  const fl = parseFloat(getVal('fFocal'));
  if (!isNaN(fl) && fl > 0) setIfd('Exif', piexif.ExifIFD.FocalLength, floatToRational(fl));

  const eb = parseFloat(getVal('fExposureBias'));
  if (!isNaN(eb)) setIfd('Exif', piexif.ExifIFD.ExposureBiasValue, floatToRational(eb));

  const f35 = parseInt(getVal('fFocal35'));
  if (!isNaN(f35) && f35 > 0) setIfd('Exif', piexif.ExifIFD.FocalLengthIn35mmFilm, f35);

  const dz = parseFloat(getVal('fDigitalZoom'));
  if (!isNaN(dz) && dz > 0) setIfd('Exif', piexif.ExifIFD.DigitalZoomRatio, floatToRational(dz));

  const wb = document.getElementById('fWhiteBalance').value;
  if (wb !== '') setIfd('Exif', piexif.ExifIFD.WhiteBalance, parseInt(wb));
  const mm = document.getElementById('fMeteringMode').value;
  if (mm !== '') setIfd('Exif', piexif.ExifIFD.MeteringMode, parseInt(mm));
  const flash = document.getElementById('fFlash').value;
  if (flash !== '') setIfd('Exif', piexif.ExifIFD.Flash, parseInt(flash));

  // GPS
  const lat = parseFloat(getVal('fLat'));
  const lng = parseFloat(getVal('fLng'));
  if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
    setIfd('GPS', piexif.GPSIFD.GPSLatitudeRef, document.getElementById('fLatRef').value);
    setIfd('GPS', piexif.GPSIFD.GPSLatitude, decimalToDms(lat));
    setIfd('GPS', piexif.GPSIFD.GPSLongitudeRef, document.getElementById('fLngRef').value);
    setIfd('GPS', piexif.GPSIFD.GPSLongitude, decimalToDms(lng));
    const alt = parseFloat(getVal('fAltitude'));
    if (!isNaN(alt)) {
      setIfd('GPS', piexif.GPSIFD.GPSAltitudeRef, alt < 0 ? 1 : 0);
      setIfd('GPS', piexif.GPSIFD.GPSAltitude, floatToRational(Math.abs(alt)));
    } else {
      delete exif['GPS'][piexif.GPSIFD.GPSAltitudeRef];
      delete exif['GPS'][piexif.GPSIFD.GPSAltitude];
    }
    const gpsDate = document.getElementById('fGpsDate').value;
    const dateSrc = gpsDate || dtVal;
    if (dateSrc) {
      const d = new Date(dateSrc);
      setIfd('GPS', piexif.GPSIFD.GPSDateStamp, `${d.getFullYear()}:${pad2(d.getMonth()+1)}:${pad2(d.getDate())}`);
      setIfd('GPS', piexif.GPSIFD.GPSTimeStamp, [floatToRational(d.getHours()), floatToRational(d.getMinutes()), floatToRational(d.getSeconds())]);
    }
  } else {
    delete exif['GPS'];
    exif['GPS'] = {};
  }

  for (const ifd of ['0th', 'Exif', 'GPS', '1st']) {
    if (exif[ifd] && Object.keys(exif[ifd]).length === 0) delete exif[ifd];
  }
  if (!exif['0th']) exif['0th'] = {};
  if (!exif['Exif']) exif['Exif'] = {};
  if (!exif['GPS']) exif['GPS'] = {};
  if (!exif['1st']) exif['1st'] = {};

  return exif;
}

// ============== HELPERS ==============
function getVal(id) { return document.getElementById(id).value; }
function setVal(id, v) { document.getElementById(id).value = v; }
function pad2(n) { return String(n).padStart(2, '0'); }

function rationalToFloat(r) {
  if (!r) return 0;
  if (Array.isArray(r)) {
    if (r.length === 2 && r[1] !== 0) return r[0] / r[1];
    return r[0] || 0;
  }
  return r;
}

function floatToRational(v, maxDenom) {
  maxDenom = maxDenom || 1000000;
  if (v === 0) return [0, 1];
  const neg = v < 0;
  v = Math.abs(v);
  const commonDenoms = [1,2,3,4,5,8,10,15,20,25,30,50,60,100,125,200,250,500,1000,2000,4000,8000];
  for (const d of commonDenoms) {
    const n = Math.round(v * d);
    if (Math.abs(n / d - v) < 0.001) return [neg ? -n : n, d];
  }
  let bestNum = 1, bestDen = 1, bestDiff = Infinity;
  for (let den = 1; den <= maxDenom && den < 100000; den++) {
    const num = Math.round(v * den);
    const diff = Math.abs(num / den - v);
    if (diff < bestDiff) { bestDiff = diff; bestNum = num; bestDen = den; }
    if (diff < 1e-10) break;
  }
  return [neg ? -bestNum : bestNum, bestDen];
}

function parseShutter(str) {
  str = str.trim();
  if (str.includes('/')) {
    const parts = str.split('/');
    if (parts.length === 2) {
      const n = parseInt(parts[0]), d = parseInt(parts[1]);
      if (n > 0 && d > 0) return [n, d];
    }
  }
  const val = parseFloat(str);
  if (!isNaN(val) && val > 0) return floatToRational(val);
  return null;
}

function decimalToDms(dec) {
  const abs = Math.abs(dec);
  const deg = Math.floor(abs);
  const min = Math.floor((abs - deg) * 60);
  const sec = ((abs - deg) * 60 - min) * 60;
  return [floatToRational(deg), floatToRational(min), floatToRational(sec)];
}

function dmsToDecimal(dms, ref) {
  if (!dms || !Array.isArray(dms)) return 0;
  let val = rationalToFloat(dms[0]) + rationalToFloat(dms[1]) / 60 + rationalToFloat(dms[2]) / 3600;
  if (ref === 'S' || ref === 'W') val = -val;
  return val;
}

// ============== GPS MAP ==============
function updateGpsMap() {
  const lat = parseFloat(getVal('fLat'));
  const lng = parseFloat(getVal('fLng'));
  const el = document.getElementById('gpsMapLink');
  const text = document.getElementById('gpsMapText');
  if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
    el.title = `点击在 OpenStreetMap 中查看 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
    text.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)} — 点击打开地图`;
    el.dataset.lat = lat;
    el.dataset.lng = lng;
    el.style.backgroundImage = `url(https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lng}&zoom=13&size=600x140&markers=${lat},${lng},red-pushpin)`;
  } else {
    el.style.backgroundImage = '';
    text.textContent = '设置坐标后点击可在地图中查看';
    delete el.dataset.lat;
    delete el.dataset.lng;
  }
}

function openGpsMap() {
  const el = document.getElementById('gpsMapLink');
  if (el.dataset.lat && el.dataset.lng) {
    window.open(`https://www.openstreetmap.org/?mlat=${el.dataset.lat}&mlon=${el.dataset.lng}#map=15/${el.dataset.lat}/${el.dataset.lng}`, '_blank');
  }
}

function resetAll() {
  if (!originalImageData) { showToast('请先上传照片', 'info'); return; }
  if (originalExif) {
    populateFormFromExif(originalExif);
  } else {
    setVal('fMake',''); setVal('fModel',''); setVal('fSoftware',''); setVal('fLens','');

  document.getElementById('presetModel').innerHTML = '<option value="">— 请先选择品牌 —</option>';

// ============== DOWNLOAD ==============
function downloadImage() {
  if (!originalImageData) {
    showToast('请先上传照片', 'error');
    return;
  }

  try {
    // Build EXIF data
    const exifObj = buildExif();
    const exifBytes = piexif.dump(exifObj);

    // Export canvas to JPEG binary, then insert EXIF
    const canvas = originalImageData.canvas;
    const mimeType = 'image/jpeg';
    const quality = 0.95;

    canvas.toBlob(function(blob) {
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const binary = reader.result;
          const newBinary = piexif.insert(exifBytes, binary);
          const bytes = binaryStringToUint8Array(newBinary);
          const outBlob = new Blob([bytes], { type: mimeType });
          const url = URL.createObjectURL(outBlob);
          const a = document.createElement('a');
          a.href = url;
          const name = currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'photo';
          a.download = `${name}_exif_edited.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('✅ 下载成功！EXIF 已嵌入到 JPEG 中', 'success');
        } catch(innerErr) {
          console.error(innerErr);
          const msg = innerErr && typeof innerErr === 'object' && innerErr.message ? innerErr.message : String(innerErr);
          showToast('❌ 生成失败: ' + msg, 'error');
        }
      };
      reader.readAsBinaryString(blob);
    }, mimeType, quality);

  } catch (err) {
    console.error('Download error:', err);
    const msg = (err && typeof err === 'object' && err.message) ? err.message : String(err);
    showToast('❌ 生成失败: ' + msg, 'error');
  }
}

function binaryStringToUint8Array(binary) {
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// ============== TOAST ==============
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
}
